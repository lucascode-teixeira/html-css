<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @charset "UTF-8";

        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Passion+One:wght@400;700;900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Passion+One:wght@400;700;900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Sriracha&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        :root {
            --font01: 'Passion One', cursive;
            --font01: 'Sriracha', sans-serif;
            --color01: rgba(255, 255, 255, 0.774);
        }

        header {
            position: relative;
            background-color: rgba(0, 0, 0, 0.89);
            height: 150px;
            margin-top: -25px;
            text-align: center;
            padding: 10px;
        }

        body {
            background-color: lightgray;
            margin: 0;
        }

        h1 {
            position: absolute;
            font-family: var(--font01);
            color: var(--color01);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%);
        }

        p {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 80%);
            color: var(--color01);
        }

        a {
            text-decoration: none;
            color: var(--color01);
        }
    </style>
</head>

<body>
    <header>
        <h1>Cordel Moderno</h1>
        <p>por <a href="">Milton Duarte</a></p>
    </header>
</body>

</html>
