<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgba(255, 255, 255, 0.068);
            margin: 0px;
        }

        header {
            background-color: red;
            height: 195px;
            padding: 5px;
        }

        nav {
            background-color: blue;
            height: 70px;
            margin: auto;
            margin-top: 120px;
        }

        section {
            background-color: red;
            height: 750px;
            width: 990px;
            margin-left: 10px;
            margin-top: 20px;
            overflow: auto;
        }

        .artigo-primario {
            background-color: blue;
            margin: 10px auto;
            height: 50%;
            width: 95%;
        }

        .artigo-secundario {
            background-color: blue;
            margin: 40px auto;
            height: 35%;
            width: 95%;
        }

        .aparte {
            background-color: red;
            width: 50px;
            height: 50px;
            display: grid;
        }
    </style>
</head>

<body>
    <header>
        <h1></h1>
        <nav></nav>
    </header>

    <main>
        <section>
            <article class="artigo-primario">
                <h2></h2>
                <p></p>
            </article>
            <article class="artigo-secundario">
                <h2></h2>
                <p></p>
                <aside class="artigo-secundario__aparte"></aside>
            </article>
        </section>
        <aside class="aparte"></aside>
    </main>

    <footer></footer>
</body>

</html>
