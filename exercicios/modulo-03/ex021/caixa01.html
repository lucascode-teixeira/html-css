<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        body {
            font: normal 1em Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, rgba(255, 0, 0, 0.267), rgba(0, 0, 255, 0.274), rgba(255, 255, 0, 0.233));
        }


        /*box-level*/
        h1 {
            /*
            display: inline; >> Para transformar de box-level para box-inline

            display: inline-block; >> Se comporta como inline pórem podemos delimitar largura e altura
            */
            text-align: center;
            background-color: rgba(255, 0, 0, 0.295);
            height: 460px;
            width: 460px;

            /*box-sizing: border-box;*/

            /*
            border-width: 10px;
            border-style: solid;
            border-color: darkslategray;
            */
            border: 10px solid rgba(128, 128, 128, 0.562);

            /*
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            padding: 10px 10px;
            padding: 10px 10px 10px 10px;
            */
            padding: 10px;

            /*
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;
            margin: 0px 221px;
            margin: auto 221px;
            margin: 0px 221px 0px 221px;
            margin: 0px auto 0px auto;
            */
            margin: 0px auto;

            /*
            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
            */
            outline: 5px dashed salmon;
        }


        /*box-level*/
        p {
            background-color: rgba(0, 0, 255, 0.171);
            text-align: justify;
            padding: 20px;
            outline: 2px dashed rgba(250, 128, 114, 0.692);
        }

        /*box-inline*/
        a {
            border: 2px solid rgba(255, 0, 0, 0.288);
            /*
            display: inline; >> Para transformar de box-inline para box-level
            
            display: inline-block; >> Se comporta como inline pórem podemos delimitar largura e altura
            */
        }
    </style>
</head>

<body>
    <h1>Exemplo de caixa Box-Level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level.</a>
        Vamos ver como tudo isso funciona</p>
</body>

</html>
