<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            position: relative;
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightgray;
        }

        h1 {
            text-align: center;
            padding-top: 50px;
        }

        table {
            position: absolute;
            height: 400px;
            width: 400px;
            border-collapse: collapse;
            left: 50%;
            top: 50%;
            transform: translate(-50%, 35%);
            text-align: center;
        }

        td {
            border: 1px solid black;
            padding: 8px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <h1>Minha primeira tabela</h1>

    <!--
        HIERARQUIA DE TABELAS (simples)
        TABLE = tabela
            TABLE ROW = linha de tabela
                TABLE HEADER = cabeçalho de tabela
                TABLE DATA = dado de tabela
    -->

    <table>
        <tr> <!-- Primeira linha -->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr">
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
            </tr>
            <tr>
                <td>A3</td>
                <td>B3</td>
                <td>C3</td>
            </tr>
            <tr>
                <td>A4</td>
                <td>B4</td>
                <td>C4</td>
            </tr>
    </table>
</body>

</html>
